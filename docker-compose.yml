# Run everything through the container — no host virtualenv.
#   docker compose build
#   docker compose run --rm app python scripts/run_poller.py     # score unvetted obs -> triage.db
#   docker compose run --rm --service-ports app python app.py    # serve the dashboard
services:
  app:
    build: .
    image: satnogs-signal
    working_dir: /app
    volumes:
      - .:/app          # live code + read/write triage.db on the host
    ports:
      - "7860:7860"   # Gradio dashboard (docker compose run --rm --service-ports app python app.py)
    env_file:
      - path: .env      # SatNOGS + HF tokens; optional so a fresh clone doesn't error
        required: false
